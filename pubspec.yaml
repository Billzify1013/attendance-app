name: attendance_app
description: Staff Attendance & Management System
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  camera: ^0.11.0+2
  google_mlkit_face_detection: ^0.13.1
  tflite_flutter: ^0.11.0
  image: ^4.2.0
  geolocator: ^13.0.1
  shared_preferences: ^2.3.2
  intl: ^0.19.0
  crypto: ^3.0.5
  pdf: ^3.11.1
  printing: ^5.13.3
  url_launcher: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/models/edgeface_s.tflite