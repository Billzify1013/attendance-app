workflows:
  android-apk:
    name: Android APK
    instance_type: mac_mini_m2
    max_build_duration: 60
    environment:
      flutter: stable
      java: 17
    scripts:
      - name: Get packages
        script: flutter pub get
      - name: Build release APK
        script: flutter build apk --release
    artifacts:
      - build/**/outputs/**/*.apk

  ios-unsigned-ipa:
    name: iOS unsigned IPA (for Sideloadly)
    instance_type: mac_mini_m2
    max_build_duration: 90
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Get packages
        script: flutter pub get
      - name: Force iOS 15.5 in Podfile
        script: |
          cd ios
          if [ -f Podfile ]; then
            sed -i '' "s/# platform :ios.*/platform :ios, '15.5'/" Podfile
            sed -i '' "s/platform :ios, '[0-9.]*'/platform :ios, '15.5'/" Podfile
          fi
          cd ..
      - name: Build iOS without signing
        script: flutter build ios --release --no-codesign
      - name: Package unsigned IPA
        script: |
          cd build/ios/iphoneos
          mkdir Payload
          cp -r Runner.app Payload/
          zip -r app-unsigned.ipa Payload
    artifacts:
      - build/ios/iphoneos/app-unsigned.ipa
